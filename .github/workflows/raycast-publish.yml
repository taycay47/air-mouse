name: Publish Raycast Extension

# Pushes to main that touch the extension auto-open/update a PR against
# Raycast's own raycast/extensions repo. Requires a RAYCAST_TOKEN repo secret
# (Raycast account -> Developer Settings -> Personal Access Token) — see
# air-mouse/README.md for the one-time setup. Raycast's human review of the
# resulting PR is the one step this can't automate away.
#
# NOTE: verify the `ray publish` auth flag/env var against Raycast's current
# CLI docs before relying on this — their publish-via-CI mechanism has
# changed shape before.

on:
  push:
    branches: [main]
    paths:
      - "air-mouse/**"

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: air-mouse
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Publish to Raycast Store
        env:
          RAYCAST_TOKEN: ${{ secrets.RAYCAST_TOKEN }}
        run: npx ray publish
