name: Release

# Tagging a version (e.g. `git tag v0.1.0 && git push --tags`) builds the menu
# bar app and publishes it as a GitHub Release. That release is the single
# artifact both "manual download" and the Homebrew tap point at.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build AirMouseBar.app
        run: |
          cd menubar
          chmod +x build_app.sh
          ./build_app.sh release

      - name: Zip app bundle
        run: |
          cd menubar
          # ditto (not plain zip) preserves resource forks/metadata correctly for .app bundles
          ditto -c -k --sequesterRsrc --keepParent AirMouseBar.app AirMouseBar.zip

      - name: Compute checksum
        id: checksum
        run: |
          cd menubar
          SHA256=$(shasum -a 256 AirMouseBar.zip | awk '{print $1}')
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA256"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "menubar/AirMouseBar.zip" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --notes "SHA256 (AirMouseBar.zip): ${{ steps.checksum.outputs.sha256 }}"
